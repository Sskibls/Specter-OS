ghostkernel-airlockd = { path = "../../core/daemons/ghostkernel-airlockd" }
ghostkernel-auditd = { path = "../../core/daemons/ghostkernel-auditd" }
ghostkernel-guardian = { path = "../../core/daemons/ghostkernel-guardian" }

[dev-dependencies]
tempfile = "3"
serde = { version = "1", features = ["derive"] }
