gk-audit = { path = "../../core/libs/gk-audit" }
gk-crypto = { path = "../../core/libs/gk-crypto" }
gk-persistence = { path = "../../core/libs/gk-persistence" }
ghostkernel-policyd = { path = "../../core/daemons/ghostkernel-policyd" }
ghostkernel-shardd = { path = "../../core/daemons/ghostkernel-shardd" }
