# PhantomKernel OS GRUB Configuration
set timeout=5
set default=0

# Load required modules
load_video
insmod gzio
insmod part_gpt
insmod ext2
insmod search_fs_uuid

# Set theme
if [ -e "${prefix}/themes/phantomkernel/theme.txt" ]; then
    theme="${prefix}/themes/phantomkernel/theme.txt"
fi

# Menu entries
menuentry "PhantomKernel OS (Release)" --class phantomkernel {
    set gfxpayload=keep
    linux /boot/vmlinuz root=LABEL=PHANTOMKERNEL ro quiet splash audit=1
    initrd /boot/initramfs.img
}

menuentry "PhantomKernel OS (Debug Mode)" --class phantomkernel {
    set gfxpayload=keep
    linux /boot/vmlinuz root=LABEL=PHANTOMKERNEL ro debug loglevel=7 audit=1
    initrd /boot/initramfs.img
}

menuentry "PhantomKernel OS (Rescue Mode)" --class phantomkernel {
    set gfxpayload=keep
    linux /boot/vmlinuz root=LABEL=PHANTOMKERNEL ro rescue systemd.unit=rescue.target
    initrd /boot/initramfs.img
}

menuentry "PhantomKernel OS (Travel Mode)" --class phantomkernel {
    set gfxpayload=keep
    linux /boot/vmlinuz root=LABEL=PHANTOMKERNEL ro travel_mode=1 ephemeral=1
    initrd /boot/initramfs.img
}

submenu "Advanced Options..." {
    menuentry "PhantomKernel OS (Single Shard Mode)" --class phantomkernel {
        set gfxpayload=keep
        linux /boot/vmlinuz root=LABEL=PHANTOMKERNEL ro single_shard=work
        initrd /boot/initramfs.img
    }
    
    menuentry "PhantomKernel OS (Network Disabled)" --class phantomkernel {
        set gfxpayload=keep
        linux /boot/vmlinuz root=LABEL=PHANTOMKERNEL ro net.disable=1
        initrd /boot/initramfs.img
    }
    
    menuentry "Memory Test (memtest86+)" --class memtest {
        linux /boot/memtest86+.bin
    }
}

menuentry "Reboot" --class reboot {
    reboot
}

menuentry "Power Off" --class shutdown {
    halt
}
