# PhantomKernel OS Syslinux Configuration
DEFAULT phantomkernel
LABEL phantomkernel
    MENU LABEL PhantomKernel OS (Release)
    KERNEL /boot/vmlinuz
    INITRD /boot/initramfs.img
    APPEND root=LABEL=PHANTOMKERNEL ro quiet splash audit=1

LABEL phantomkernel-debug
    MENU LABEL PhantomKernel OS (Debug Mode)
    KERNEL /boot/vmlinuz
    INITRD /boot/initramfs.img
    APPEND root=LABEL=PHANTOMKERNEL ro debug loglevel=7

LABEL phantomkernel-rescue
    MENU LABEL PhantomKernel OS (Rescue Mode)
    KERNEL /boot/vmlinuz
    INITRD /boot/initramfs.img
    APPEND root=LABEL=PHANTOMKERNEL ro rescue

LABEL phantomkernel-travel
    MENU LABEL PhantomKernel OS (Travel Mode)
    KERNEL /boot/vmlinuz
    INITRD /boot/initramfs.img
    APPEND root=LABEL=PHANTOMKERNEL ro travel_mode=1 ephemeral=1

LABEL memtest
    MENU LABEL Memory Test (memtest86+)
    KERNEL /boot/memtest86+.bin

LABEL local
    MENU LABEL Boot from local drive
    LOCALBOOT 0

LABEL reboot
    MENU LABEL Reboot
    COM32 reboot.c32

LABEL poweroff
    MENU LABEL Power Off
    COM32 poweroff.c32

TIMEOUT 50
TIMEOUT_STYLE menu
UI vesamenu.c32
MENU TITLE PhantomKernel OS - Privacy-First Secure Operating System
MENU COLOR border       30;44   #40ffffff #a0000000 std
MENU COLOR title        1;36;44 #9033ccff #a0000000 std
MENU COLOR sel          7;37;40 #e0ffffff #20ffffff all
MENU COLOR unsel        37;44   #50ffffff #a0000000 std
MENU COLOR help         37;40   #c0ffffff #a0000000 std
MENU COLOR timeout_msg  37;40   #80ffffff #00000000 std
MENU COLOR timeout      1;37;40 #c0ffffff #00000000 std
MENU COLOR msg07        37;40   #90ffffff #a0000000 std
MENU COLOR tabmsg       31;40   #90ffffff #00000000 std
